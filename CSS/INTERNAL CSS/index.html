<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INTERNAL-CSS</title>
    <style>
        h3{
            color: red;
        }
        nav{
            text-align: center;
        }
        a{
            text-decoration: none;
            color: purple;
        }
        #section1{
            width: 100%;
            height: 70vh;
            margin-top: 5rem;
            text-align: center;
        }
        #dp{
            width: 30%;
            border-radius: 50%;
            box-shadow: 0px 0px 15px red;
        }
        #section1>h1{
            font-size: 3rem;
            color: rgb(2, 85, 2);
            font-family: cursive;
        }
        #section2{
            width: 100%;
            height: 100vh;
            margin-top: 5rem;
        }
        #location{
            padding-top: 2rem;
        }
        #location>h2{
            display: inline;
            color: orangered;
            font-weight: normal;
            text-shadow: 0px 0px 3px grey;
        }
        #intro{
            width: 100%;
            text-align: center;
        }
        #intro>p>span{
            color: blue;
            font-size: 1.5rem;
        }
    </style>
  </head>
  <body>
    <header>
      <div>
        <img src="icons8-trophy-48.png" alt="" width="2%" />
        <h3 style="display: inline;">NSK</h3>
      </div>
    </header>
    <nav>
      <a href="">HOME</a>
      <a href="">ABOUT</a>
      <a href="">SKILLS</a>
      <a href="">CONTACT</a>
    </nav>
    <main>
        <!-- 1 section -->
        <section id="section1">
            <img src="BLACK-SHIRT.jpg" alt="" width="30%" id="dp">
            <h1>BATHULA NAGA SAI KIRAN</h1>
        </section>
        <!-- 2 section -->
        <section id="section2">
            <div id="location">
                <img src="icons8-location-50.png" alt="" width="2%">
                <h2>HYDERABAD</h2>
            </div>
            <div id="intro">
                <p>i'm <span>BATHULA NAGA SAI KIRAN</span> - aspiring to become <span>software developer</span></p>
            </div>
        </section>
    </main>
  </body>
</html>
